<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<title>RepoRanger - Моите GitHub Репа</title>
<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>
<body>

<h1>RepoRanger</h1>
<p class="subtitle">Твоето табло за GitHub репа в реално време</p>

<div class="top-controls">

<button id="darkModeToggle">🌙 Dark Mode</button>

<select id="languageFilter">
<option value="all">All Languages</option>
</select>

</div>

<!-- Summary box -->
<div id="summary">

<div class="summary-card">
<span class="summary-number" id="total-repos">0</span>
<span class="summary-label">Repos</span>
</div>

<div class="summary-card">
<span class="summary-number" id="total-stars">0</span>
<span class="summary-label">Stars</span>
</div>

<div class="summary-card">
<span class="summary-number" id="total-forks">0</span>
<span class="summary-label">Forks</span>
</div>

<div class="summary-card">
<span class="summary-number" id="total-commits">0</span>
<span class="summary-label">Commits</span>
</div>

</div>

<!-- Sorting buttons -->
<div id="sorting">

<button onclick="sortRepos('stars')">⭐ Stars</button>
<button onclick="sortRepos('forks')">🍴 Forks</button>
<button onclick="sortRepos('pushed')">🚀 Last Push</button>
<button onclick="sortRepos('commits')">📦 Commits</button>

</div>

<canvas id="commitChart"></canvas>

<div id="repo-container"></div>

<script src="script.js"></script>

</body>
</html>
